<!doctype html>
<html lang="sv">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>Torpinventering</title>

	<!-- Bootstrap -->
	<link rel="stylesheet"
		  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

	<!-- Leaflet -->
	<link rel="stylesheet"
		  href="https://unpkg.com/leaflet/dist/leaflet.css">

	<!-- Framework CSS -->
	<link rel="stylesheet" href="css/site.css">
</head>

<body class="vh-100">

	<div class="container-fluid vh-100">
		<div class="row h-100">

			<!-- Karta -->
			<main class="col-9 p-0 position-relative">
				<div id="map" class="w-100 h-100"></div>

				<div class="position-absolute bottom-0 start-0 end-0 bg-light p-2">
					<label for="yearSlider" class="form-label mb-0">
						År: <span id="currentYear"></span>
					</label>
					<input id="yearSlider"
						   type="range"
						   class="form-range">
				</div>
			</main>

			<!-- Sidpanel -->
			<aside class="col-3 border-start p-3 overflow-auto">

				<h1 id="title">Laddar...</h1>

				<div class="mb-3">
					<input id="search"
						   class="form-control"
						   placeholder="Sök...">
				</div>

				<div id="layers"></div>

				<hr>

				<div id="details"></div>

			</aside>

		</div>
	</div>

	<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

	<script src="js/app.js"></script>

</body>
</html>
